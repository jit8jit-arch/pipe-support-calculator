<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>uPVC Pipe, Fittings & Support Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0e14;--c1:#12161f;--c2:#181d28;--c3:#1e2330;--bd:#262d3d;
  --am:#e5a000;--amb:#fbbf24;--amd:rgba(229,160,0,.12);
  --bl:#3b82f6;--bld:rgba(59,130,246,.12);
  --gn:#10b981;--gnd:rgba(16,185,129,.12);
  --rd:#ef4444;--t1:#e2e5ec;--t2:#99a1b3;--t3:#636d83
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;line-height:1.5}
.hdr{position:sticky;top:0;z-index:99;background:var(--c1);border-bottom:2px solid var(--am);padding:14px 20px}
.hdr-in{max-width:1500px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:12px}
.logo-i{width:42px;height:42px;border-radius:10px;background:var(--am);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#0b0e14}
.logo h1{font-size:18px;font-weight:700}
.logo small{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:2px;display:block}
.wrap{max-width:1500px;margin:0 auto;padding:24px 20px 80px}
.card{background:var(--c1);border:1px solid var(--bd);border-radius:10px;margin-bottom:18px;overflow:hidden}
.card-hd{padding:13px 18px;background:var(--c2);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.card-bd{padding:18px}
.stag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--am);margin-bottom:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.row4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.row5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
@media(max-width:1200px){.row5,.row4{grid-template-columns:1fr 1fr}}
@media(max-width:760px){.row2,.row3,.row4,.row5{grid-template-columns:1fr}}
label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:4px}
input,select,textarea{width:100%;padding:10px 12px;background:var(--c3);border:1px solid var(--bd);border-radius:7px;color:var(--t1);font-family:inherit;font-size:14px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--am);box-shadow:0 0 0 3px var(--amd)}
select{cursor:pointer}
textarea{min-height:180px;resize:vertical}
.note{font-size:12px;color:var(--t2);background:var(--c3);border-left:3px solid var(--am);padding:10px 12px;border-radius:0 6px 6px 0;margin-top:10px}
.small-note{font-size:11px;color:var(--t3);margin-top:8px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-am{background:var(--am);color:#0b0e14}.btn-am:hover{background:var(--amb)}
.btn-gh{background:var(--c1);color:var(--t1);border:1px solid var(--bd)}.btn-gh:hover{background:var(--c2)}
.btn-da{background:transparent;color:var(--am);border:2px dashed var(--am);opacity:.8}.btn-da:hover{opacity:1;background:var(--amd)}
.btn-bl{background:var(--bl);color:#fff}.btn-bl:hover{opacity:.92}
.btn-gn{background:var(--gn);color:#fff}.btn-gn:hover{opacity:.92}
.btn-sm{padding:7px 14px;font-size:12px}
.btn-ap{width:100%;padding:8px;background:var(--amd);color:var(--am);border:1px dashed rgba(229,160,0,.4);border-radius:7px;font-family:inherit;font-size:13px;cursor:pointer;margin-top:4px}
.btn-ap:hover{background:rgba(229,160,0,.2)}
.btn-x{width:26px;height:26px;border-radius:6px;border:none;background:transparent;color:var(--t3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.btn-x:hover{color:var(--rd);background:rgba(239,68,68,.1)}
.btn-dr{font-size:12px;padding:3px 10px;border-radius:6px;background:transparent;color:var(--t3);border:none;cursor:pointer;font-family:inherit}
.btn-dr:hover{color:var(--rd);background:rgba(239,68,68,.1)}
.tbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.tbar-sep{width:1px;background:var(--bd);margin:0 4px;align-self:stretch}

.prow{display:flex;align-items:center;gap:8px;background:var(--c3);border:1px solid var(--bd);border-radius:7px;padding:7px 10px;margin-bottom:7px;flex-wrap:wrap}
.prow .pi{font-size:11px;color:var(--t3);min-width:24px;font-weight:600}
.prow select{flex:2;padding:6px 10px;font-size:13px;min-width:80px}
.prow .qty-wrap{display:flex;align-items:center;gap:4px;flex:0 0 auto}
.prow .qty-wrap label{margin:0;white-space:nowrap;font-size:10px}
.prow .qty-wrap input{width:55px;padding:6px 8px;font-size:13px;text-align:center}
.prow .pod{font-size:11px;color:var(--t3);min-width:130px;text-align:right;font-weight:600}
.plbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);font-weight:700;margin:14px 0 8px}

.subgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.mini-card{background:var(--c3);border:1px solid var(--bd);border-radius:8px;padding:12px}
.sec-title{font-size:13px;font-weight:700;color:var(--am);margin-bottom:10px}
.system-title{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.system-name{font-size:15px;font-weight:700;color:var(--am)}

#results{display:none}
#results.show{display:block}
.sts{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:14px}
.st{background:var(--c3);border:1px solid var(--bd);border-radius:8px;padding:10px 12px}
.st .sl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:2px;font-weight:600}
.st .sv{font-size:22px;font-weight:800;color:var(--am)}
.st .su{font-size:11px;color:var(--t2);margin-left:2px}

table.mt{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
.mt th{background:var(--c2);padding:9px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--t3);border-bottom:1px solid var(--bd)}
.mt td{padding:9px 12px;border-bottom:1px solid var(--bd);color:var(--t2)}
.mt tr:last-child td{border-bottom:none}
.mt .center{text-align:center}
.mt .right{text-align:right}
.mt .q{font-weight:700;color:var(--t1)}
.mt .cat-struct td{border-left:3px solid var(--am);background:rgba(229,160,0,.04)}
.mt .cat-fix td{border-left:3px solid var(--bl);background:rgba(59,130,246,.04)}
.mt .cat-clamp td{border-left:3px solid var(--gn);background:rgba(16,185,129,.04)}

.copy-box{margin-top:18px;padding:14px;background:var(--c3);border:1px solid var(--bd);border-radius:10px}
.copy-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.copy-head h4{font-size:12px;color:var(--am);letter-spacing:1px;text-transform:uppercase}
.copy-note{font-size:11px;color:var(--t3);margin-bottom:8px}
#fileImport{display:none}

@media print{
  body{background:#fff;color:#111;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .hdr{position:relative;background:#fff;border-color:#333}
  .card{background:#fff;border-color:#bbb;break-inside:avoid}
  .card-hd{background:#f3f3f3!important}
  .st{background:#f5f5f5;border-color:#ccc}
  .st .sv{color:#b45309}
  .noprint{display:none!important}
  #results.show{display:block}
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <div class="logo">
      <div class="logo-i">PF</div>
      <div>
        <h1>uPVC Pipe, Fittings & Support Calculator</h1>
        <small>BSEN 1452 PN 15 CLASS E / BSEN 1452-3 SCH 80</small>
      </div>
    </div>

    <div class="tbar noprint" style="margin-bottom:0">
      <button class="btn btn-am btn-sm" id="btnCalcTop">Calculate</button>
      <button class="btn btn-gh btn-sm" id="btnResetTop">Reset</button>
      <button class="btn btn-bl btn-sm" id="btnPdfTop">Export PDF</button>
      <button class="btn btn-gn btn-sm" id="btnXlsxTop">Export Excel</button>
      <button class="btn btn-gh btn-sm" onclick="window.print()">Print</button>
      <button class="btn btn-gh btn-sm" id="btnSaveLocalTop">Save Local</button>
      <button class="btn btn-gh btn-sm" id="btnLoadLocalTop">Load Local</button>
      <button class="btn btn-gh btn-sm" id="btnSaveFileTop">Save File</button>
      <button class="btn btn-gh btn-sm" id="btnLoadFileTop">Load File</button>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="card">
    <div class="card-bd">
      <div class="stag">Project Details</div>
      <div class="row4">
        <div>
          <label>Project Name</label>
          <input type="text" id="projName" placeholder="Enter project name">
        </div>
        <div>
          <label>Project Ref</label>
          <input type="text" id="projRef" placeholder="Enter project reference">
        </div>
        <div>
          <label>uPVC Pipe Brand</label>
          <select id="pipeBrand">
            <option value="Cosmoplast, UAE" selected>Cosmoplast, UAE</option>
            <option value="Hepworth">Hepworth</option>
          </select>
        </div>
        <div>
          <label>uPVC Fittings Brand</label>
          <select id="fitBrand">
            <option value="Cosmoplast, UAE" selected>Cosmoplast, UAE</option>
            <option value="Atlas">Atlas</option>
            <option value="GF">GF</option>
          </select>
        </div>
      </div>
      <div class="row2" style="margin-top:14px">
        <div>
          <label>Additional Auto-Line Support Type</label>
          <select id="extraSupportType">
            <option value="t1" selected>Full C-Channel</option>
            <option value="t2">Threaded Rod + C-Channel</option>
            <option value="t3">Threaded Rod + Rubber Clamp</option>
          </select>
        </div>
        <div class="note" style="margin-top:20px">
          <b>Pipe:</b> BSEN 1452 PN 15 Class E<br>
          <b>Fittings:</b> BSEN 1452-3 SCH 80<br>
          <b>Pipe support spacing:</b> 1.5 m<br>
          <b>Plant room base plate:</b> 7 Nos per support for plant room C-channel supports
        </div>
      </div>
    </div>
  </div>

  <div id="systemsBox"></div>
  <button class="btn btn-da noprint" id="btnAddSystem" type="button">+ Add System</button>

  <div class="tbar noprint" style="margin-top:24px">
    <button class="btn btn-am" id="btnCalc">Calculate</button>
    <button class="btn btn-gh" id="btnReset">Reset</button>
    <div class="tbar-sep"></div>
    <button class="btn btn-bl btn-sm" id="btnPdf">Export PDF</button>
    <button class="btn btn-gn btn-sm" id="btnXlsx">Export Excel</button>
    <button class="btn btn-gh btn-sm" onclick="window.print()">Print</button>
    <div class="tbar-sep"></div>
    <button class="btn btn-gh btn-sm" id="btnSaveLocal">Save Local</button>
    <button class="btn btn-gh btn-sm" id="btnLoadLocal">Load Local</button>
    <button class="btn btn-gh btn-sm" id="btnSaveFile">Save File</button>
    <button class="btn btn-gh btn-sm" id="btnLoadFile">Load File</button>
    <input type="file" id="fileImport" accept=".json">
  </div>

  <div id="results"></div>
</div>

<script>
const PK = ['0.5','0.75','1','1.25','1.5','2','3','4','6','8','10','12'];
const P_INCH = {'0.5':'1/2"','0.75':'3/4"','1':'1"','1.25':'1 1/4"','1.5':'1 1/2"','2':'2"','3':'3"','4':'4"','6':'6"','8':'8"','10':'10"','12':'12"'};
const P_DN = {'0.5':'DN15','0.75':'DN20','1':'DN25','1.25':'DN32','1.5':'DN40','2':'DN50','3':'DN80','4':'DN100','6':'DN150','8':'DN200','10':'DN250','12':'DN300'};
const P_OD = {'0.5':21.5,'0.75':26.9,'1':33.7,'1.25':42.4,'1.5':48.4,'2':60.5,'3':89.1,'4':114.5,'6':168.5,'8':219.4,'10':273.4,'12':324.3};

const PIPE_SPEC='BSEN 1452 PN 15 CLASS E';
const FIT_SPEC='BSEN 1452-3 SCH 80';
const PIPE_LEN_PER_NO=6;
const SP=1.5, OL=300, GP=6, GE=3, VH=80;
const TN={t1:'Full C-Channel Support',t2:'Threaded Rod + C-Channel',t3:'Threaded Rod + Rubber Clamp'};
const BASE_PLATE_ITEM='BASE PLATE WITH DOUBLE FIX HDG, SFT 345, UNITECH';
const BASE_PLATE_QTY_PER_SUPPORT=7;
const LOCAL_INDEX_KEY='pfsc_multi_project_index_v2';

let SYSTEMS=[];
let SYS_ID=0;
let LAST_RESULT=null;

function sizeOptions(selected='2'){
  return PK.map(k=>`<option value="${k}" ${k===selected?'selected':''}>${P_INCH[k]}</option>`).join('');
}
function countOptions(selected=0){
  let h='';
  for(let i=0;i<=10;i++) h+=`<option value="${i}" ${String(i)===String(selected)?'selected':''}>${i}</option>`;
  return h;
}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function numVal(id){return parseFloat(document.getElementById(id)?.value)||0}
function strVal(id){return document.getElementById(id)?.value||''}
function addQty(map,key,qty){ if(qty<=0)return; map[key]=(map[key]||0)+qty; }
function addPipe(pipeMap,size,length,remark){
  if(length<=0) return;
  if(!pipeMap[size]) pipeMap[size]={length:0,remarks:[]};
  pipeMap[size].length += length;
  if(remark) pipeMap[size].remarks.push(remark);
}
function addFitting(fitMap,size,item,qty,brand='',spec=''){
  if(qty<=0) return;
  const key=size+'||'+item+'||'+brand+'||'+spec;
  if(!fitMap[key]) fitMap[key]={size,item,qty:0,brand,spec};
  fitMap[key].qty += qty;
}
function addMaterial(mat,key,qty){ if(qty<=0) return; mat[key]=(mat[key]||0)+qty; }
function getCat(item){
  const s=item.toLowerCase();
  if(s.includes('c-channel') || s.includes('threaded rod') || s.includes('base plate')) return 'struct';
  if(s.includes('u-strap') || s.includes('rubber clamp')) return 'clamp';
  return 'fix';
}
function getCatClass(item){
  const c=getCat(item);
  if(c==='struct') return 'cat-struct';
  if(c==='clamp') return 'cat-clamp';
  return 'cat-fix';
}
function copyText(id){
  const ta=document.getElementById(id);
  if(!ta) return;
  ta.select();
  ta.setSelectionRange(0,99999);
  navigator.clipboard.writeText(ta.value).then(()=>alert('Copied successfully.')).catch(()=>{document.execCommand('copy'); alert('Copied successfully.')});
}
function valveItem(size){
  return parseFloat(size)<=2 ? `Ball Valve - ${P_INCH[size]} (Cepex, Spain)` : `Butterfly Valve - ${P_INCH[size]} (Cepex, Spain)`;
}
function valveMountKitItem(size){
  return `Valve Mounting Kit - ${P_INCH[size]} (Cepex, Spain)`;
}
function nrvItem(size){
  return parseFloat(size)<=2 ? `Spring Type NRV - ${P_INCH[size]}` : `Check Valve - ${P_INCH[size]}`;
}
function flexibleItem(size){
  return `Flexible Connector - ${P_INCH[size]} (Weicco)`;
}
function reducerItem(fromSize,toSize){
  return `Reducer - ${P_INCH[fromSize]} x ${P_INCH[toSize]}`;
}
function requiresMountKit(size){ return parseFloat(size)>=3; }

function makeSystem(){
  SYS_ID++;
  return {
    id:SYS_ID,
    name:`System ${String(SYS_ID).padStart(2,'0')}`,
    fittings:{
      inletCount:0,inletSize:'2',
      vacuumCount:0,vacuumSize:'2',
      overflowCount:0,overflowSize:'2',
      skimmerCount:0,skimmerSize:'2',
      mainDrainCount:0,mainDrainSize:'2'
    },
    equipment:{
      filterPump:{count:0,inSize:'2',outSize:'2'},
      boosterPump:{count:0,inSize:'2',outSize:'2'},
      circulationPump:{count:0,inSize:'2',outSize:'2'},
      featurePump:{count:0,inSize:'2',outSize:'2'},
      sandFilter:{count:0,inSize:'2',outSize:'2'},
      uvUnit:{count:0,inSize:'2',outSize:'2'},
      heatCoolUnit:{count:0,inSize:'2',outSize:'2'},
      dosingUnit:{count:0,inSize:'2',outSize:'2'}
    },
    headers:[
      {id:1,name:'Pump Suction Header',type:'suction',size:'4',length:0,linked:'filterPump'},
      {id:2,name:'Pump Delivery Header',type:'delivery',size:'4',length:0,linked:'filterPump'}
    ],
    routes:[
      {id:1,name:'Route 01',distance:0,supportType:'t1',pipes:[{size:'2',qty:1}]}
    ],
    lines:{
      pumpSuction:{size:'2',distance:0},
      plantRoomMainInlet:{size:'2',distance:0},
      heatCoolMain:{size:'2',distance:0},
      freshWater:{size:'1',distance:18},
      backwash:{size:'2',distance:0}
    },
    baseDrainLines:[
      {id:1,name:'Base Drain Suction 01',size:'2',distance:6}
    ],
    vacuumLines:[
      {id:1,name:'Vacuum Line 01',size:'2',distance:6}
    ],
    additionalLines:[]
  };
}

function renderSystems(){
  const box=document.getElementById('systemsBox');
  box.innerHTML=SYSTEMS.map(sys=>{
    const sid=sys.id;
    return `
    <div class="card">
      <div class="card-hd">
        <div class="system-title">
          <span class="system-name">${esc(sys.name)}</span>
        </div>
        <button class="btn-dr noprint" onclick="removeSystem(${sid})" ${SYSTEMS.length===1?'style="opacity:.4;pointer-events:none"':''}>Remove System</button>
      </div>
      <div class="card-bd">
        <div class="row3">
          <div>
            <label>System Name</label>
            <input type="text" id="sys_${sid}_name" value="${esc(sys.name)}">
          </div>
          <div></div><div></div>
        </div>

        <div class="card" style="margin-top:16px">
          <div class="card-hd"><span>Pool Fittings</span></div>
          <div class="card-bd">
            <div class="row5">
              <div><label>No of Inlets</label><input type="number" id="sys_${sid}_fit_inletCount" min="0" value="${sys.fittings.inletCount}"></div>
              <div><label>Inlet Pipe Size</label><select id="sys_${sid}_fit_inletSize">${sizeOptions(sys.fittings.inletSize)}</select></div>
              <div><label>No of Vacuum Points</label><input type="number" id="sys_${sid}_fit_vacuumCount" min="0" value="${sys.fittings.vacuumCount}"></div>
              <div><label>Vacuum Pipe Size</label><select id="sys_${sid}_fit_vacuumSize">${sizeOptions(sys.fittings.vacuumSize)}</select></div>
              <div><label>No of Overflow Drains</label><input type="number" id="sys_${sid}_fit_overflowCount" min="0" value="${sys.fittings.overflowCount}"></div>
            </div>
            <div class="row5" style="margin-top:14px">
              <div><label>Overflow Pipe Size</label><select id="sys_${sid}_fit_overflowSize">${sizeOptions(sys.fittings.overflowSize)}</select></div>
              <div><label>No of Skimmers</label><input type="number" id="sys_${sid}_fit_skimmerCount" min="0" value="${sys.fittings.skimmerCount}"></div>
              <div><label>Skimmer Pipe Size</label><select id="sys_${sid}_fit_skimmerSize">${sizeOptions(sys.fittings.skimmerSize)}</select></div>
              <div><label>No of Main Drains</label><input type="number" id="sys_${sid}_fit_mainDrainCount" min="0" value="${sys.fittings.mainDrainCount}"></div>
              <div><label>Main Drain Pipe Size</label><select id="sys_${sid}_fit_mainDrainSize">${sizeOptions(sys.fittings.mainDrainSize)}</select></div>
            </div>
            <div class="small-note">
              Each pool fitting point considers 4 Nos 90° Elbow, 2 Nos 45° Elbow, 1 No Socket/Coupler.
              Inlet and Vacuum Point also add 1 No Female Adaptor.
              All points consider 1.5 m pipe each.
            </div>
          </div>
        </div>

        <div class="card" style="margin-top:16px">
          <div class="card-hd"><span>Equipment Connections</span></div>
          <div class="card-bd">
            <div class="subgrid">
              ${equipmentCardHtml(sid,'filterPump','Filter Pump',sys.equipment.filterPump)}
              ${equipmentCardHtml(sid,'boosterPump','Booster Pump',sys.equipment.boosterPump)}
              ${equipmentCardHtml(sid,'circulationPump','Circulation Pump',sys.equipment.circulationPump)}
              ${equipmentCardHtml(sid,'featurePump','Feature Pump',sys.equipment.featurePump)}
              ${equipmentCardHtml(sid,'sandFilter','Sand Filter',sys.equipment.sandFilter)}
              ${equipmentCardHtml(sid,'uvUnit','UV Unit',sys.equipment.uvUnit)}
              ${equipmentCardHtml(sid,'heatCoolUnit','Heat Cool Unit',sys.equipment.heatCoolUnit)}
              ${equipmentCardHtml(sid,'dosingUnit','Dosing Unit',sys.equipment.dosingUnit)}
            </div>
            <div class="small-note">
              For each equipment side, the program counts:
              2 Nos 90° Elbow, 1 No Tee, 2 Nos Socket/Coupler,
              1 valve, 1 flexible connector, and mounting kit where applicable.
              Pipe allowance used: 1.5 m per side.
            </div>
          </div>
        </div>

        <div class="card" style="margin-top:16px">
          <div class="card-hd"><span>Headers</span></div>
          <div class="card-bd">
            <div id="sys_${sid}_headers_box">
              ${sys.headers.map((h,hi)=>headerRowHtml(sid,h,hi)).join('')}
            </div>

function addSystem(){ syncAll(); SYSTEMS.push(makeSystem()); renderSystems(); }
function removeSystem(id){ if(SYSTEMS.length===1) return; syncAll(); SYSTEMS=SYSTEMS.filter(s=>s.id!==id); renderSystems(); }
function addHeader(sid){ syncAll(); const s=findSystem(sid); if(!s) return; const nid=s.headers.length?Math.max(...s.headers.map(x=>x.id))+1:1; s.headers.push({id:nid,name:'New Header',type:'suction',size:'4',length:0,linked:'filterPump'}); renderSystems(); }
function removeHeader(sid,hid){ syncAll(); const s=findSystem(sid); if(!s) return; s.headers=s.headers.filter(x=>x.id!==hid); renderSystems(); }
function addRoute(sid){ syncAll(); const s=findSystem(sid); if(!s) return; const nid=s.routes.length?Math.max(...s.routes.map(x=>x.id))+1:1; s.routes.push({id:nid,name:'Route '+String(nid).padStart(2,'0'),distance:0,supportType:'t1',pipes:[{size:'2',qty:1}]}); renderSystems(); }
function removeRoute(sid,rid){ syncAll(); const s=findSystem(sid); if(!s) return; if(s.routes.length===1) return; s.routes=s.routes.filter(x=>x.id!==rid); renderSystems(); }
function addRoutePipe(sid,rid){ syncAll(); const r=findRoute(sid,rid); if(!r) return; r.pipes.push({size:'2',qty:1}); renderSystems(); }
function removeRoutePipe(sid,rid,pi){ syncAll(); const r=findRoute(sid,rid); if(!r) return; if(r.pipes.length===1) return; r.pipes.splice(pi,1); renderSystems(); }
function addBaseDrainLine(sid){ syncAll(); const s=findSystem(sid); if(!s) return; const nid=s.baseDrainLines.length?Math.max(...s.baseDrainLines.map(x=>x.id))+1:1; s.baseDrainLines.push({id:nid,name:'Base Drain Suction '+String(nid).padStart(2,'0'),size:'2',distance:6}); renderSystems(); }
function addVacuumLine(sid){ syncAll(); const s=findSystem(sid); if(!s) return; const nid=s.vacuumLines.length?Math.max(...s.vacuumLines.map(x=>x.id))+1:1; s.vacuumLines.push({id:nid,name:'Vacuum Line '+String(nid).padStart(2,'0'),size:'2',distance:6}); renderSystems(); }
function addAdditionalLine(sid){ syncAll(); const s=findSystem(sid); if(!s) return; const nid=s.additionalLines.length?Math.max(...s.additionalLines.map(x=>x.id))+1:1; s.additionalLines.push({id:nid,name:'Additional Line '+String(nid).padStart(2,'0'),size:'2',distance:0}); renderSystems(); }
function removeSimpleLine(sid,group,id){ syncAll(); const s=findSystem(sid); if(!s) return; const prop=group==='basedrain'?'baseDrainLines':group==='vacuum'?'vacuumLines':'additionalLines'; if(s[prop].length===1 && group!=='additional') return; s[prop]=s[prop].filter(x=>x.id!==id); renderSystems(); }
function findSystem(id){ return SYSTEMS.find(s=>s.id===id); }
function findRoute(sid,rid){ const s=findSystem(sid); return s ? s.routes.find(r=>r.id===rid) : null; }

function syncAll(){
  for(const sys of SYSTEMS){
    const sid=sys.id;
    sys.name=strVal(`sys_${sid}_name`) || sys.name;

    sys.fittings.inletCount=numVal(`sys_${sid}_fit_inletCount`);
    sys.fittings.inletSize=strVal(`sys_${sid}_fit_inletSize`)||'2';
    sys.fittings.vacuumCount=numVal(`sys_${sid}_fit_vacuumCount`);
    sys.fittings.vacuumSize=strVal(`sys_${sid}_fit_vacuumSize`)||'2';
    sys.fittings.overflowCount=numVal(`sys_${sid}_fit_overflowCount`);
    sys.fittings.overflowSize=strVal(`sys_${sid}_fit_overflowSize`)||'2';
    sys.fittings.skimmerCount=numVal(`sys_${sid}_fit_skimmerCount`);
    sys.fittings.skimmerSize=strVal(`sys_${sid}_fit_skimmerSize`)||'2';
    sys.fittings.mainDrainCount=numVal(`sys_${sid}_fit_mainDrainCount`);
    sys.fittings.mainDrainSize=strVal(`sys_${sid}_fit_mainDrainSize`)||'2';

    for(const key of Object.keys(sys.equipment)){
      sys.equipment[key].count=numVal(`sys_${sid}_eq_${key}_count`);
      sys.equipment[key].inSize=strVal(`sys_${sid}_eq_${key}_in`)||'2';
      sys.equipment[key].outSize=strVal(`sys_${sid}_eq_${key}_out`)||'2';
    }

    sys.headers.forEach(h=>{
      h.name=strVal(`sys_${sid}_hdr_${h.id}_name`)||h.name;
      h.type=strVal(`sys_${sid}_hdr_${h.id}_type`)||h.type;
      h.size=strVal(`sys_${sid}_hdr_${h.id}_size`)||h.size;
      h.length=numVal(`sys_${sid}_hdr_${h.id}_length`);
      h.linked=strVal(`sys_${sid}_hdr_${h.id}_linked`)||h.linked;
    });

    sys.routes.forEach(r=>{
      r.name=strVal(`sys_${sid}_route_${r.id}_name`)||r.name;
      r.distance=numVal(`sys_${sid}_route_${r.id}_distance`);
      r.supportType=strVal(`sys_${sid}_route_${r.id}_support`)||r.supportType;
      r.pipes=r.pipes.map((p,pi)=>({
        size:strVal(`sys_${sid}_route_${r.id}_pipe_${pi}_size`)||p.size,
        qty:numVal(`sys_${sid}_route_${r.id}_pipe_${pi}_qty`)||1
      }));
    });

    for(const key of Object.keys(sys.lines)){
      sys.lines[key].size=strVal(`sys_${sid}_line_${key}_size`)||sys.lines[key].size;
      sys.lines[key].distance=numVal(`sys_${sid}_line_${key}_distance`);
    }

    sys.baseDrainLines=sys.baseDrainLines.map(l=>({
      id:l.id,name:strVal(`sys_${sid}_basedrain_${l.id}_name`)||l.name,size:strVal(`sys_${sid}_basedrain_${l.id}_size`)||l.size,distance:numVal(`sys_${sid}_basedrain_${l.id}_distance`)
    }));
    sys.vacuumLines=sys.vacuumLines.map(l=>({
      id:l.id,name:strVal(`sys_${sid}_vacuum_${l.id}_name`)||l.name,size:strVal(`sys_${sid}_vacuum_${l.id}_size`)||l.size,distance:numVal(`sys_${sid}_vacuum_${l.id}_distance`)
    }));
    sys.additionalLines=sys.additionalLines.map(l=>({
      id:l.id,name:strVal(`sys_${sid}_additional_${l.id}_name`)||l.name,size:strVal(`sys_${sid}_additional_${l.id}_size`)||l.size,distance:numVal(`sys_${sid}_additional_${l.id}_distance`)
    }));
  }
}

function addSupportForLine(name,dist,type,pipeEntries,addPlantRoomBasePlate,grand,details){
  if(dist<=0) return;
  const pipes=[];
  pipeEntries.forEach(pe=>{ for(let i=0;i<pe.qty;i++) pipes.push(pe.size); });
  const nP=pipes.length;
  const nS=Math.floor(dist/SP)+1;
  let sumOD=0;
  pipes.forEach(p=>sumOD+=P_OD[p]/10);
  const hori=sumOD + GP*(nP-1) + GE*2;
  let sm=0,lg=0;
  pipes.forEach(p=>{ if(P_OD[p]<=63) sm++; else lg++; });

  const mat={};
  function ustraps(){
    pipes.forEach(p=>addMaterial(mat,`U-Strap Rubber Lined - ${P_INCH[p]} (${P_DN[p]})`,nS));
    if(sm>0){
      addMaterial(mat,'8mm Nut',sm*nS*2);
      addMaterial(mat,'8mm Bolt',sm*nS*2);
      addMaterial(mat,'8mm Washer',sm*nS*2);
    }
    if(lg>0){
      addMaterial(mat,'10mm Nut',lg*nS*2);
      addMaterial(mat,'10mm x 20mm GI Bolt',lg*nS*2);
      addMaterial(mat,'10mm Washer',lg*nS*2);
    }
  }
  if(type==='t1'){
    const perS=hori+VH*2, cCh=perS*nS;
    addMaterial(mat,'C-Channel 41x41mm - 3m lengths',Math.ceil(cCh/OL));
    addMaterial(mat,'4-Hole L-Clamp',nS*2);
    addMaterial(mat,'10mm x 20mm GI Bolt',nS*8);
    addMaterial(mat,'10mm Spring Nut',nS*4);
    addMaterial(mat,'10mm Unifix',nS*4);
    if(addPlantRoomBasePlate) addMaterial(mat,BASE_PLATE_ITEM,nS*BASE_PLATE_QTY_PER_SUPPORT);
    ustraps();
  }else if(type==='t2'){
    const cCh=hori*nS, rod=VH*2*nS;
    addMaterial(mat,'C-Channel 41x41mm - 3m lengths',Math.ceil(cCh/OL));
    addMaterial(mat,'10mm Threaded Rod - 3m lengths',Math.ceil(rod/OL));
    addMaterial(mat,'10mm Nut',nS*6);
    addMaterial(mat,'10mm Washer',nS*6);
    addMaterial(mat,'10mm Unifix',nS*2);
    if(addPlantRoomBasePlate) addMaterial(mat,BASE_PLATE_ITEM,nS*BASE_PLATE_QTY_PER_SUPPORT);
    ustraps();
  }else{
    const rod=VH*2*nS;
    addMaterial(mat,'10mm Threaded Rod - 3m lengths',Math.ceil(rod/OL));
    addMaterial(mat,'10mm Nut',nS*2);
    addMaterial(mat,'10mm Washer',nS*2);
    addMaterial(mat,'10mm Unifix',nS);
    pipes.forEach(p=>addMaterial(mat,`Rubber Clamp - ${P_INCH[p]} (${P_DN[p]})`,nS));
  }

  Object.keys(mat).forEach(k=>addQty(grand,k,mat[k]));
  details.push({name,dist,type,mat,supports:nS});
}

function equipmentPipeLengthPerUnit(){ return 1.5; }

function calcProject(){
  syncAll();

  const projName=strVal('projName')||'Untitled Project';
  const projRef=strVal('projRef')||'-';
  const pipeBrand=strVal('pipeBrand');
  const fitBrand=strVal('fitBrand');
  const extraSupportType=strVal('extraSupportType');

  const pipeMap={}, fitMap={}, supportGrand={}, supportDetails=[];
  const valveMap={}, valvePurpose=[];
  const extraSupportPipeMap={};

  function addAutoPipe(size,length,remark,plantRoom=false){
    addPipe(pipeMap,size,length,remark);
    if(length>0){
      if(!extraSupportPipeMap[size]) extraSupportPipeMap[size]=[];
      extraSupportPipeMap[size].push({length,remark,plantRoom});
    }
  }
  function addPoolFittingPoint(sysName,size,count,label,needFemale){
    if(count<=0) return;
    addAutoPipe(size,count*1.5,`${sysName} - ${label} pipe allowance`,false);
    addFitting(fitMap,size,'uPVC Elbow 90 DEG',count*4,fitBrand,FIT_SPEC);
    addFitting(fitMap,size,'uPVC Elbow 45 DEG',count*2,fitBrand,FIT_SPEC);
    addFitting(fitMap,size,'uPVC Socket / Coupler',count*1,fitBrand,FIT_SPEC);
    if(needFemale) addFitting(fitMap,size,'uPVC Female Adaptor',count*1,fitBrand,FIT_SPEC);
  }
  function addGenericConnectionSide(sysName,equipTitle,size,count,sidePurpose){
    if(count<=0) return;
    addAutoPipe(size,count*equipmentPipeLengthPerUnit(),`${sysName} - ${equipTitle} ${sidePurpose} side pipe`,true);
    addFitting(fitMap,size,'uPVC Elbow 90 DEG',count*2,fitBrand,FIT_SPEC);
    addFitting(fitMap,size,'uPVC Tee',count*1,fitBrand,FIT_SPEC);
    addFitting(fitMap,size,'uPVC Socket / Coupler',count*2,fitBrand,FIT_SPEC);
    addValveAndPurpose(valveMap,valvePurpose,size,count,`${sysName} - ${equipTitle} ${sidePurpose} side`);
    addFitting(fitMap,size,flexibleItem(size),count,'Weicco','');
  }

  for(const sys of SYSTEMS){
    const sysName=sys.name||'System';

    addPoolFittingPoint(sysName,sys.fittings.inletSize,sys.fittings.inletCount,'Inlet',true);
    addPoolFittingPoint(sysName,sys.fittings.vacuumSize,sys.fittings.vacuumCount,'Vacuum Point',true);
    addPoolFittingPoint(sysName,sys.fittings.overflowSize,sys.fittings.overflowCount,'Overflow Drain',false);
    addPoolFittingPoint(sysName,sys.fittings.skimmerSize,sys.fittings.skimmerCount,'Skimmer',false);
    addPoolFittingPoint(sysName,sys.fittings.mainDrainSize,sys.fittings.mainDrainCount,'Main Drain',false);

    const eq=sys.equipment;
    const pumpKeys=['filterPump','boosterPump','circulationPump','featurePump'];
    const pumpTitles={filterPump:'Filter Pump',boosterPump:'Booster Pump',circulationPump:'Circulation Pump',featurePump:'Feature Pump'};
    for(const key of pumpKeys){
      const e=eq[key];
      if(e.count>0){
        addGenericConnectionSide(sysName,pumpTitles[key],e.inSize,e.count,'In');
        addGenericConnectionSide(sysName,pumpTitles[key],e.outSize,e.count,'Out');
        addFitting(fitMap,'PAD','Antivibration Pad',e.count,'','');
      }
    }

    if(eq.sandFilter.count>0){
      addGenericConnectionSide(sysName,'Sand Filter',eq.sandFilter.inSize,eq.sandFilter.count,'In');
      addGenericConnectionSide(sysName,'Sand Filter',eq.sandFilter.outSize,eq.sandFilter.count,'Out');
      addValveAndPurpose(valveMap,valvePurpose,eq.sandFilter.inSize,eq.sandFilter.count,`${sysName} - Sand Filter additional valve`);
      addValveAndPurpose(valveMap,valvePurpose,sys.lines.plantRoomMainInlet.size,1,`${sysName} - Sand Filter bypass valve (main inlet line size)`);
    }

    if(eq.uvUnit.count>0){
      addGenericConnectionSide(sysName,'UV Unit',eq.uvUnit.inSize,eq.uvUnit.count,'In');
      addGenericConnectionSide(sysName,'UV Unit',eq.uvUnit.outSize,eq.uvUnit.count,'Out');
      addValveAndPurpose(valveMap,valvePurpose,sys.lines.plantRoomMainInlet.size,1,`${sysName} - UV Unit bypass valve (main inlet line size)`);
    }

    if(eq.heatCoolUnit.count>0){
      addGenericConnectionSide(sysName,'Heat Cool Unit',eq.heatCoolUnit.inSize,eq.heatCoolUnit.count,'In');
      addGenericConnectionSide(sysName,'Heat Cool Unit',eq.heatCoolUnit.outSize,eq.heatCoolUnit.count,'Out');
      addNRVAndPurpose(valveMap,valvePurpose,eq.heatCoolUnit.outSize,eq.heatCoolUnit.count,`${sysName} - Heat Cool Unit NRV`,true);
      addValveAndPurpose(valveMap,valvePurpose,sys.lines.heatCoolMain.size,1,`${sysName} - Heat Cool Unit bypass valve`);
      addValveAndPurpose(valveMap,valvePurpose,sys.lines.heatCoolMain.size,2,`${sysName} - Heat Cool Unit plant room valves`);
      addValveAndPurpose(valveMap,valvePurpose,sys.lines.plantRoomMainInlet.size,1,`${sysName} - Heat Cool plant room valve as per main inlet line`);
      addFitting(fitMap,'PAD','Antivibration Pad',eq.heatCoolUnit.count,'','');
    }

    if(eq.dosingUnit.count>0){
      addGenericConnectionSide(sysName,'Dosing Unit',eq.dosingUnit.inSize,eq.dosingUnit.count,'In');
      addGenericConnectionSide(sysName,'Dosing Unit',eq.dosingUnit.outSize,eq.dosingUnit.count,'Out');
      addAutoPipe(eq.dosingUnit.inSize,eq.dosingUnit.count*6,`${sysName} - Dosing Unit extra in pipe`,true);
      addAutoPipe(eq.dosingUnit.outSize,eq.dosingUnit.count*6,`${sysName} - Dosing Unit extra out pipe`,true);
    }

    sys.headers.forEach(h=>{
      if(h.length>0) addAutoPipe(h.size,h.length,`${sysName} - ${h.name}`,true);
      const linked=eq[h.linked];
      const count=linked ? linked.count : 0;
      const connSize = linked ? (h.type==='suction' ? linked.inSize : linked.outSize) : null;
      if(count>0 && connSize){
        addFitting(fitMap,h.size,'uPVC Tee',count,fitBrand,FIT_SPEC);
        addFitting(fitMap,h.size,'uPVC End Cap',2,fitBrand,FIT_SPEC);
        addFitting(fitMap,h.size,reducerItem(h.size,connSize),count,fitBrand,FIT_SPEC);
      }
    });

    sys.routes.forEach(r=>{
      if(r.distance>0){
        r.pipes.forEach(p=>addPipe(pipeMap,p.size,r.distance*p.qty,`${sysName} - ${r.name}`));
        addSupportForLine(`${sysName} - ${r.name}`,r.distance,r.supportType,r.pipes,false,supportGrand,supportDetails);
      }
    });

    const plantLines = [
      {name:'Pump Suction Connection', size:sys.lines.pumpSuction.size, distance:sys.lines.pumpSuction.distance},
      {name:'Plant Room Main Inlet Line', size:sys.lines.plantRoomMainInlet.size, distance:sys.lines.plantRoomMainInlet.distance},
      {name:'Heat Cool Main Line', size:sys.lines.heatCoolMain.size, distance:sys.lines.heatCoolMain.distance},
      {name:'Fresh Water Line', size:sys.lines.freshWater.size, distance:sys.lines.freshWater.distance},
      {name:'Backwash Line', size:sys.lines.backwash.size, distance:sys.lines.backwash.distance}
    ];
    plantLines.forEach(l=>{
      if(l.distance>0) addAutoPipe(l.size,l.distance,`${sysName} - ${l.name}`,true);
    });

    if(sys.lines.backwash.distance>0){
      addValveAndPurpose(valveMap,valvePurpose,sys.lines.backwash.size,1,`${sysName} - Backwash line valve`);
      addNRVAndPurpose(valveMap,valvePurpose,sys.lines.backwash.size,1,`${sysName} - Backwash line check valve`,false);
    }

    sys.baseDrainLines.forEach(l=>{
      if(l.distance>0){
        addAutoPipe(l.size,l.distance,`${sysName} - ${l.name}`,true);
        addValveAndPurpose(valveMap,valvePurpose,l.size,1,`${sysName} - ${l.name} valve`);
      }
    });

    sys.vacuumLines.forEach(l=>{
      if(l.distance>0){
        addAutoPipe(l.size,l.distance,`${sysName} - ${l.name}`,true);
        addValveAndPurpose(valveMap,valvePurpose,l.size,1,`${sysName} - ${l.name} valve`);
      }
    });

    sys.additionalLines.forEach(l=>{
      if(l.distance>0) addAutoPipe(l.size,l.distance,`${sysName} - ${l.name}`,true);
    });
  }

  Object.keys(extraSupportPipeMap).forEach(size=>{
    const entries=extraSupportPipeMap[size];
    const totalLen=entries.reduce((a,b)=>a+b.length,0);
    const plantRoomFlag=entries.some(x=>x.plantRoom);
    if(totalLen>0){
      addSupportForLine(`Auto Pipe Qty - ${P_INCH[size]}`,totalLen,extraSupportType,[{size,qty:1}],plantRoomFlag,supportGrand,supportDetails);
    }
  });

  Object.keys(valveMap).forEach(item=>{
    addFitting(fitMap,'VALVE',item,valveMap[item],'','');
  });

  const pipeRows = Object.keys(pipeMap).sort((a,b)=>parseFloat(a)-parseFloat(b)).map((size,i)=>({
    sl:i+1,size,sizeLabel:P_INCH[size],length:pipeMap[size].length,pipeNos:Math.ceil(pipeMap[size].length/PIPE_LEN_PER_NO),remarks:(pipeMap[size].remarks||[]).join(' | ')
  }));
  const fitRows = Object.keys(fitMap).map(k=>fitMap[k]).sort((a,b)=>{
    const aa = a.size in P_INCH ? parseFloat(a.size) : 999;
    const bb = b.size in P_INCH ? parseFloat(b.size) : 999;
    if(aa!==bb) return aa-bb;
    return a.item.localeCompare(b.item);
  }).map((f,i)=>({sl:i+1,size:f.size,sizeLabel:P_INCH[f.size]||'',item:f.item,qty:f.qty,brand:f.brand||'',spec:f.spec||''}));
  const supportGrandRows = Object.keys(supportGrand).sort().map((item,i)=>({sl:i+1,item,qty:supportGrand[item],category:getCat(item)}));
  const valvePurposeRows = valvePurpose.map((v,i)=>({sl:i+1,item:v.item,size:v.size,qty:v.qty,purpose:v.purpose}));

  LAST_RESULT = {projName,projRef,pipeBrand,fitBrand,pipeRows,fitRows,supportDetails,supportGrandRows,valvePurposeRows};
  renderResults();
}

function getProjectData(){
  syncAll();
  return {
    version:10,
    projName:strVal('projName'),
    projRef:strVal('projRef'),
    pipeBrand:strVal('pipeBrand'),
    fitBrand:strVal('fitBrand'),
    extraSupportType:strVal('extraSupportType'),
    systems:SYSTEMS,
    sysId:SYS_ID
  };
}
function applyProjectData(data){
  document.getElementById('projName').value=data.projName||'';
  document.getElementById('projRef').value=data.projRef||'';
  document.getElementById('pipeBrand').value=data.pipeBrand||'Cosmoplast, UAE';
  document.getElementById('fitBrand').value=data.fitBrand||'Cosmoplast, UAE';
  document.getElementById('extraSupportType').value=data.extraSupportType||'t1';
  SYSTEMS=data.systems||[makeSystem()];
  SYS_ID=data.sysId||SYSTEMS.length||1;
  if(!SYSTEMS.length) SYSTEMS=[makeSystem()];
  renderSystems();
}
function saveProjectLocal(data){
  const key=(data.projName||'project').trim()||'project';
  localStorage.setItem('pfsc_proj_'+key, JSON.stringify(data));
  let idx=[]; try{ idx=JSON.parse(localStorage.getItem(LOCAL_INDEX_KEY)||'[]'); }catch(e){}
  if(!idx.includes(key)) idx.push(key);
  localStorage.setItem(LOCAL_INDEX_KEY, JSON.stringify(idx));
  alert('Project saved locally.');
}
function loadProjectLocal(name){
  const raw=localStorage.getItem('pfsc_proj_'+name);
  if(!raw){ alert('Local project not found.'); return; }
  applyProjectData(JSON.parse(raw));
  LAST_RESULT=null;
  document.getElementById('results').innerHTML='';
  document.getElementById('results').classList.remove('show');
  alert('Local project loaded.');
}
function showLocalProjectPicker(){
  let idx=[]; try{ idx=JSON.parse(localStorage.getItem(LOCAL_INDEX_KEY)||'[]'); }catch(e){}
  if(!idx.length){ alert('No local saved projects found.'); return; }
  let msg='Available local projects:\n\n';
  idx.forEach((x,i)=>msg+=`${i+1}. ${x}\n`);
  msg+='\nEnter exact project name:';
  const name=prompt(msg);
  if(name) loadProjectLocal(name);
}

document.getElementById('btnPdf').onclick=function(){
  if(!LAST_RESULT){ alert('Please calculate first.'); return; }
  try{
    const d=LAST_RESULT;
    const jsPDF=window.jspdf.jsPDF;
    const doc=new jsPDF('p','mm','a4');
    const W=210, mg=12;
    let y=15;
    function addHeader(title, subtitle){
      doc.setFillColor(229,160,0); doc.rect(0,0,W,24,'F');
      doc.setTextColor(11,14,20); doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.text(title,mg,10);
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.text(subtitle,mg,17);
      y=30;
    }
    function addSectionTitle(text){
      if(y>265){ doc.addPage(); y=15; }
      doc.setTextColor(229,160,0); doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.text(text,mg,y); y+=4;
    }
    function supportFillColor(cat){
      if(cat==='struct') return [255,248,230];
      if(cat==='clamp') return [230,255,245];
      return [235,245,255];
    }
    addHeader('uPVC Pipe, Fittings & Support Calculator', `${d.projName} | Ref: ${d.projRef}`);

    addSectionTitle('Combined Pipe Summary');
    doc.autoTable({
      startY:y,
      head:[['Sl No','Pipe Size','Total Length (Mtr)','6 Mtr Pipe Nos','Brand','Specification']],
      body:d.pipeRows.map(r=>[r.sl,r.sizeLabel,r.length.toFixed(2),r.pipeNos,d.pipeBrand,PIPE_SPEC]),
      margin:{left:mg,right:mg},
      styles:{fontSize:7,cellPadding:2},
      headStyles:{fillColor:[30,35,48],textColor:[229,160,0],fontStyle:'bold'},
      theme:'grid'
    });
    y=doc.lastAutoTable.finalY+8;

    addSectionTitle('Combined Fittings / Valve / NRV Summary');
    doc.autoTable({
      startY:y,
      head:[['Sl No','Pipe Size','Item Description','Qty','Brand','Specification']],
      body:d.fitRows.map(r=>[r.sl,r.sizeLabel,r.item,r.qty,r.brand,r.spec]),
      margin:{left:mg,right:mg},
      styles:{fontSize:7,cellPadding:2},
      headStyles:{fillColor:[30,35,48],textColor:[229,160,0],fontStyle:'bold'},
      theme:'grid'
    });
    y=doc.lastAutoTable.finalY+8;

    addSectionTitle('Valve / NRV Details and Purpose');
    doc.autoTable({
      startY:y,
      head:[['Sl No','Valve / NRV Item','Size','Qty','Purpose']],
      body:d.valvePurposeRows.map(r=>[r.sl,r.item,r.size,r.qty,r.purpose]),
      margin:{left:mg,right:mg},
      styles:{fontSize:7,cellPadding:2},
      headStyles:{fillColor:[30,35,48],textColor:[229,160,0],fontStyle:'bold'},
      theme:'grid'
    });
    y=doc.lastAutoTable.finalY+8;

    for(const sl of d.supportDetails){
      const mk=Object.keys(sl.mat);
      addSectionTitle(`Support Detail - ${sl.name}`);
      doc.autoTable({
        startY:y,
        head:[['Sl No','Item Description','Qty','UOM','Category']],
        body:mk.map((item,i)=>[i+1,item,sl.mat[item],'Nos',getCat(item)]),
        margin:{left:mg,right:mg},
        styles:{fontSize:7,cellPadding:2},
        headStyles:{fillColor:[30,35,48],textColor:[229,160,0],fontStyle:'bold'},
        theme:'grid',
        didParseCell:function(cell){
          if(cell.section==='body'){
            const item=cell.row.cells[1].text.join('');
            cell.cell.styles.fillColor=supportFillColor(getCat(item));
          }
        }
      });
      y=doc.lastAutoTable.finalY+6;
    }

    addSectionTitle('Combined Support Materials');
    doc.autoTable({
      startY:y,
      head:[['Sl No','Item Description','Qty','UOM','Category']],
      body:d.supportGrandRows.map(r=>[r.sl,r.item,r.qty,'Nos',r.category]),
      margin:{left:mg,right:mg},
      styles:{fontSize:7,cellPadding:2},
      headStyles:{fillColor:[30,35,48],textColor:[229,160,0],fontStyle:'bold'},
      theme:'grid',
      didParseCell:function(cell){
        if(cell.section==='body'){
          const item=cell.row.cells[1].text.join('');
          cell.cell.styles.fillColor=supportFillColor(getCat(item));
        }
      }
    });

    const pages=doc.internal.getNumberOfPages();
    for(let p=1;p<=pages;p++){
      doc.setPage(p);
      doc.setFontSize(7); doc.setTextColor(140);
      doc.text('Generated: '+new Date().toLocaleDateString(),mg,290);
      doc.text(`Page ${p}/${pages}`,W-28,290);
    }
    doc.save((d.projName||'project').replace(/\s+/g,'_')+'_Pipe_Fittings_Support.pdf');
  }catch(e){ alert('PDF export error: '+e.message); }
};

    const wsGrand=XLSX.utils.aoa_to_sheet(grand);
    wsGrand['!cols']=[{wch:8},{wch:48},{wch:10},{wch:8},{wch:14}];
    XLSX.utils.book_append_sheet(wb,wsGrand,'Support Summary');

    XLSX.writeFile(wb,(d.projName||'project').replace(/\s+/g,'_')+'_Pipe_Fittings_Support.xlsx');
  }catch(e){ alert('Excel export error: '+e.message); }
};

document.getElementById('btnSaveLocal').onclick=function(){ try{ saveProjectLocal(getProjectData()); }catch(e){ alert('Local save error: '+e.message); } };
document.getElementById('btnLoadLocal').onclick=function(){ showLocalProjectPicker(); };
document.getElementById('btnSaveFile').onclick=function(){
  try{
    const data=getProjectData();
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=(data.projName||'project').replace(/\s+/g,'_')+'_pipe_fittings_support.json';
    a.click();
    URL.revokeObjectURL(a.href);
  }catch(e){ alert('Save file error: '+e.message); }
};
document.getElementById('btnLoadFile').onclick=function(){ document.getElementById('fileImport').click(); };
document.getElementById('fileImport').onchange=function(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      applyProjectData(data);
      LAST_RESULT=null;
      document.getElementById('results').innerHTML='';
      document.getElementById('results').classList.remove('show');
      alert('Project loaded successfully.');
    }catch(err){ alert('Error loading file: '+err.message); }
  };
  reader.readAsText(file);
  e.target.value='';
};

document.getElementById('btnAddSystem').onclick=function(){ addSystem(); };
document.getElementById('btnCalc').onclick=calcProject;
document.getElementById('btnReset').onclick=function(){
  document.getElementById('projName').value='';
  document.getElementById('projRef').value='';
  document.getElementById('pipeBrand').value='Cosmoplast, UAE';
  document.getElementById('fitBrand').value='Cosmoplast, UAE';
  document.getElementById('extraSupportType').value='t1';
  SYSTEMS=[makeSystem()];
  renderSystems();
  LAST_RESULT=null;
  document.getElementById('results').innerHTML='';
  document.getElementById('results').classList.remove('show');
};

document.getElementById('btnCalcTop').onclick = () => document.getElementById('btnCalc').click();
document.getElementById('btnResetTop').onclick = () => document.getElementById('btnReset').click();
document.getElementById('btnPdfTop').onclick = () => document.getElementById('btnPdf').click();
document.getElementById('btnXlsxTop').onclick = () => document.getElementById('btnXlsx').click();
document.getElementById('btnSaveLocalTop').onclick = () => document.getElementById('btnSaveLocal').click();
document.getElementById('btnLoadLocalTop').onclick = () => document.getElementById('btnLoadLocal').click();
document.getElementById('btnSaveFileTop').onclick = () => document.getElementById('btnSaveFile').click();
document.getElementById('btnLoadFileTop').onclick = () => document.getElementById('btnLoadFile').click();

SYSTEMS=[makeSystem()];
renderSystems();
</script>
</body>
</html>
